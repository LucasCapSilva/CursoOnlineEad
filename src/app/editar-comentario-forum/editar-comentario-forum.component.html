<div class="container mt-5 mb-5">

  <div class="card-body">
    <div>
      <div class="form-group">
        <label class="" for="titulo">Comentário:</label>
        <input type="text" class="form-control" id="titulo" aria-describedby="emailHelp" placeholder="Digite aqui o tema" [(ngModel)]='forumComentario.comment'>
      </div>

      <div class="d-flex justify-content-center">
          <button type="button" class="btn btn-outline-secondary btn-responsive" (click)="atualizar()">Atualizar</button>
      </div>
    </div>
  </div>
</div>
