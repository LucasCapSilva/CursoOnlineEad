<div class="container-fluid">
  <div class="container">
    <div class="row d-flex justify-content-center">
      <div class="col-md-8">
        <h2 class="text-center">Cadastro de perfil do Github:</h2>
        <h5 class="text-center text-danger">Não cadastre o link do seu github, você precisa cadastrar o seu nickName que se encontra no perfil do seu gitHub.</h5>
      
        <form class="d-flex flex-column align-items-center">
          <div class="form-group w-100">
            <input
              type="text"
              placeholder="{{ nome }}"
              disabled
              class="form-control mb-4 w-100"
            />
          </div>

          <div class="form-group w-100">
            <input
              type="text"
              placeholder="Digite o seu usuário do Github"
              class="form-control w-100"
              name='githubParticipante'
              [(ngModel)]="githubParticipante.userGithub"
            />
          </div>

          <button
            class="w-50 btn btn-outline-info"
            (click)="cadastrarGithubParticipante()"
          >
            Cadastrar Github
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
