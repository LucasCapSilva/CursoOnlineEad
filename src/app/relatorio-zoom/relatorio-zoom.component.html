<div class="container">

  <div class="row d-flex justify-content-center mt-5">
    <div class="col-md-5">
      <div class="form-group w-100">
        <label for="inputState" class="mb-0">Escolha uma Turma</label>
        <select name="nome" [(ngModel)]="idTurma" (change)="findByIdTurma()" class="form-control">
          <option *ngFor="let item of listaTurma" value={{item.id}}>
              {{item.descricao}}
          </option>
      </select>
      </div>
    </div>
    <div class="col-md-5">
      <div class="form-group w-100">
        <label for="data" class="mb-0">Escolha uma data:</label>
        <input class="form-control" type="date" name="data" id="data" [(ngModel)]='zoom.data'>
      </div>
    </div>
  </div>

  <div class="row mb-5 mt-3">
    <div class="col md-12 d-flex justify-content-center">
      <button class="btn btn-outline-info btn-responsive" (click)="findChamada()">Listar</button>
    </div>
  </div>

  <div *ngIf='listagemOk'>
    <div class="row">
      <table class="table table-hover">
        <thead>
          <tr>
            <th scope="col">Nome</th>
            <th scope="col">Turma</th>
            <th scope="col">Data</th>
            <th scope="col">Presente</th>
            <th scope="col">Qtd Clicks</th>
          </tr>
        </thead>
        <tbody *ngFor='let item of listaZoom'>
          <tr>
            <th scope="row">{{item.user}}</th>
            <td>{{item.turma}}</td>
            <td>{{item.data | date: "dd/MM/yyyy"}}</td>
            <td>{{item.isPresente? 'Sim':'Não'}}</td>
            <td>{{item.qtd}}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="row mt-5 mb-5">
      <div class="col-md-12 d-flex justify-content-center">
        <button class="btn btn-outline-success btn-responsive" (click)='exportarExcel()'>Exportar para excel</button>
      </div>
    </div>
  </div>

</div>
