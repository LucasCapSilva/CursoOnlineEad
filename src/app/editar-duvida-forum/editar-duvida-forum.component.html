<div class="container mt-5 mb-5">

  <div class="card-body">
    <div>
      <div class="form-group">
        <label class="" for="titulo">Tema:</label>
        <input type="text" class="form-control" id="titulo" aria-describedby="emailHelp" placeholder="Digite aqui o tema" [(ngModel)]='forumDuvida.titulo'>
      </div>

      <div class="form-group">
          <label class="" for="texto">Dúvida:</label>
          <textarea class="form-control" id="texto" rows="3" placeholder="Digite aqui a sua dúvida" [(ngModel)]='forumDuvida.question'></textarea>
      </div>
      <div class="d-flex justify-content-center">
          <button type="button" class="btn btn-outline-secondary btn-responsive" (click)="atualizar()">Atualizar</button>
      </div>
    </div>
  </div>
</div>
