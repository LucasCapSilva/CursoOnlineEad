<div class="container">

  <div class="form-group">
    <label class="" for="titulo">*Titulo:</label>
    <input type="text" class="form-control" id="titulo" aria-describedby="emailHelp" placeholder="Digite aqui o titulo" [(ngModel)]='avisos.titulo'>
  </div>

  <div class="form-group">
      <label class="" for="texto">*Descrição:</label>
      <textarea class="form-control" id="texto" rows="3" placeholder="Digite aqui a descrição" [(ngModel)]='avisos.texto'></textarea>
  </div>
  <div class="row">
    <div class="col-md-6">
      <div class="form-group">
        <label class="" for="titulo">Link:</label>
        <input type="text" class="form-control" id="titulo" aria-describedby="emailHelp" placeholder="Insira aqui o link (opcional)" [(ngModel)]='avisos.link'>
      </div>
    </div>
    <div class="col-md-6">
      <div class="form-group">
        <label class="" for="titulo">*Turma:</label>
        <select name="nome" [(ngModel)]="idTurma" (change)="findByIdTurma()" class="form-control">
          <option *ngFor="let turma of listaTurma" value={{turma.id}}>
              {{turma.descricao}}
          </option>
        </select>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-center mt-5">
      <button type="button" class="btn btn-outline-success btn-responsive" (click)="atualizar()">Atualizar</button>
  </div>

</div>
