<div class="modal-content">
  <div class="modal-header">
    <h5 class="modal-title">{{title}}</h5>
    <button type="button" class="close" data-dismiss="modal" aria-label="Fechar">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <p>{{msg}}</p>
  </div>

  <div *ngIf='simTxt === "Editar" && naoTxt === "Apagar"; else normal'>
    <div class="modal-footer">
      <div class="col-md-12 d-flex justify-content-center">

          <button class="btn btn-outline-info mr-3" [routerLink]='["/cronograma-instrutor", idEvento]' (click)='onClose()'>{{simTxt}}</button>

          <button type="button" class="btn btn-outline-danger" [routerLink]='["/deletar-cronograma", idEvento]' (click)='onClose()'>{{naoTxt}}</button>

      </div>
    </div>
  </div>

  <ng-template #normal>
    <div class="modal-footer">
      <div class="col-md-12 d-flex justify-content-center">
        <div *ngIf='simTxt != null'>
          <button class="btn btn-outline-success mr-3" (click)="onConfirm()">{{simTxt}}</button>
        </div>

        <div *ngIf='naoTxt != null'>
          <button type="button" class="btn btn-outline-danger" data-dismiss="modal" (click)="onClose()">{{naoTxt}}</button>
        </div>
      </div>
    </div>
  </ng-template>


</div>
