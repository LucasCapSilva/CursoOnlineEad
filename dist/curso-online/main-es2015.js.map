<div class="container">

  <ng-container *ngIf="loading == 0 || loading == 2; else elseTemplate">
    <div class="row mt-3 mb-5 d-flex justify-content-center">
      <div class="col-md-8 shadow ">
  
        <div class="form-group mt-3">
          <label for="assistenteSocial">Técnico de bem estar social (Selecionado: {{form.assistenteSocial?.nome}})</label>
          <select class="form-control" id="assistenteSocial" [(ngModel)]='idUserAssistente'
            (change)='findByIdUserAssistente()'>
            <option *ngFor='let user of listaUserByProfile' [value]='user.id'>
              {{user.nome}}
            </option>
          </select>
        </div>
  
        <div class="row mt-3">
          <div class="col">
            <ng-container *ngIf="form != null; else elseTemplate">
              <div class="form-group">
                <label for="curso">Curso (Selecionado: {{form.curso?.descricao}})</label>
                <select class="form-control" id="curso" disabled>
                  <option selected value={{form.curso?.descricao}}>
                    {{form.curso?.descricao}}
                  </option>
                </select>
              </div>
            </ng-container>
            <ng-template #elseTemplate>
              <div class="form-group">
                <label for="curso">Curso (Selecionado: {{form.curso?.descricao}})</label>
                <select class="form-control" id="curso" [(ngModel)]="idCurso" (change)="findByIdCurso()">
                  <option selected *ngFor='let curso of listaCurso' value={{curso.id}}>
                    {{curso.descricao}}
                  </option>
                </select>
              </div>
            </ng-template>
  
  
          </div>
          <div class="col">
            <ng-container *ngIf="form != null; else elseTemplate">
              <div class="form-group">
                <label for="turma">Turma (Selecionado: {{form.turma?.descricao}})</label>
                <select class="form-control" id="turma" disabled>
                  <option value={{form.turma?.descricao}}>
                    {{form.turma?.descricao}}
                  </option>
                </select>
              </div>
            </ng-container>
            <ng-template #elseTemplate>
              <div class="form-group">
                <label for="turma">Turma (Selecionado: {{form.turma?.descricao}})</label>
                <select class="form-control" id="turma" [(ngModel)]="idTurma" (change)="findByIdTurma()">
                  <option *ngFor="let turma of listaTurma" value={{turma.id}}>
                    {{turma.descricao}}
                  </option>
                </select>
              </div>
            </ng-template>
  
  
          </div>
        </div>
  
        <div class="form-group">
          <ng-container *ngIf="form != null; else elseTemplate">
            <label for="participante">Participante (Selecionado: {{form.user?.nome}})</label>
            <select class="form-control" id="participante" disabled>
              <option value={{form.user?.nome}}>
                {{form.user?.nome}}
              </option>
            </select>
          </ng-container>
          <ng-template #elseTemplate>
            <label for="participante">Participante (Selecionado: {{form.user?.nome}})</label>
            <select class="form-control" id="participante" [(ngModel)]="idUser" (change)="findByIdUser()">
              <option *ngFor='let user of turma.users' value={{user.id}}>
                {{user.nome}}
              </option>
            </select>
          </ng-template>
  
  
        </div>
  
        <div class="row">
          <div class="col">
            <div class="form-group">
              <label for="data">Data do atendimento</label>
              <input type="date" class="form-control" id="data" [(ngModel)]='form.data'>
            </div>
          </div>
          <div class="col">
            <ng-container *ngIf="form != null; else elseTemplate">
              <div class="form-group">
                <label for="solicitante">Solicitante (Selecionado: {{form.solicitante}})</label>
                <select class="form-control" id="solicitante" disabled>
                  <option value={{form.solicitante}}>
                    {{form.solicitante}}
                  </option>
                </select>
              </div>
            </ng-container>
            <ng-template #elseTemplate>
              <div class="form-group">
                <label for="solicitante">Solicitante (Selecionado: {{form.solicitante}})</label>
                <select class="form-control" id="solicitante" (change)='profileEscolhido($event)'>
                  <option disabled selected hidden>Selecione um solicitante</option>
                  <option *ngFor='let profile of listaProfile' value={{profile}}>
                    {{profile}}
                  </option>
                </select>
              </div>
            </ng-template>
  
  
          </div>
        </div>
  
        <div class="form-group m-0">
          <label for="demanda">Demanda apresentada:</label>
        </div>
  
        <div class="ml-4 mt-0">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="administrativo"
              [(ngModel)]='demanda.administrativo'>
  
            <label class="form-check-label" for="administrativo">
              Administrativo <i *ngIf="form.demandas.administrativo === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="apoioInternet"
              [(ngModel)]='demanda.apoioInternetNotebook'>
            <label class="form-check-label" for="apoioInternet">
              Apoio internet/notebook <i *ngIf="form.demandas.apoioInternetNotebook === true"
                class="fa fa-check text-success" aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="ausencias" [(ngModel)]='demanda.ausencias'>
            <label class="form-check-label" for="ausencias">
              Ausências <i *ngIf="form.demandas.ausencias === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="comportamental"
              [(ngModel)]='demanda.comportamental'>
  
            <label class="form-check-label" for="comportamental">
              Comportamental <i *ngIf="form.demandas.comportamental === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
  
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="beneficios" [(ngModel)]='demanda.beneficios'>
            <label class="form-check-label" for="beneficios">
              Benefícios <i *ngIf="form.demandas.beneficios === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="conflito"
              [(ngModel)]='demanda.conflitoEntreParticipantes'>
            <label class="form-check-label" for="beneficios">
              Conflito entre participantes <i *ngIf="form.demandas.conflitoEntreParticipantes === true"
                class="fa fa-check text-success" aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="desistencia" [(ngModel)]='demanda.desistencia'>
            <label class="form-check-label" for="desistencia">
              Desistência <i *ngIf="form.demandas.desistencia === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="emocional" [(ngModel)]='demanda.emocional'>
            <label class="form-check-label" for="emocional">
              Emocional <i *ngIf="form.demandas.emocional === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="engajamento" [(ngModel)]='demanda.engajamento'>
            <label class="form-check-label" for="engajamento">
              Engajamento <i *ngIf="form.demandas.engajamento === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="empregabilidade"
              [(ngModel)]='demanda.empregabilidade'>
            <label class="form-check-label" for="empregabilidade">
              Empregabilidade <i *ngIf="form.demandas.empregabilidade === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="presença" [(ngModel)]='demanda.presenca'>
            <label class="form-check-label" for="presença">
              Presença <i *ngIf="form.demandas.presenca === true" class="fa fa-check text-success" aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="problemasEducacionais"
              [(ngModel)]='demanda.problemasEducacionais'>
            <label class="form-check-label" for="problemasEducacionais">
              Problemas Educacionais <i *ngIf="form.demandas.problemasEducacionais === true"
                class="fa fa-check text-success" aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="problemasTecnicos"
              [(ngModel)]='demanda.problemasTecnicos'>
            <label class="form-check-label" for="problemasTecnicos">
              Problemas Técnicos <i *ngIf="form.demandas.problemasTecnicos === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="saude" [(ngModel)]='demanda.saude'>
            <label class="form-check-label" for="saude">
              Saúde <i *ngIf="form.demandas.saude === true" class="fa fa-check text-success" aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="saudeMental" [(ngModel)]='demanda.saudeMental'>
            <label class="form-check-label" for="saudeMental">
              Saúde Mental <i *ngIf="form.demandas.saudeMental === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="socioeconomico"
              [(ngModel)]='demanda.socioeconomico'>
            <label class="form-check-label" for="socioeconomico">
              Socioeconômico <i *ngIf="form.demandas.socioeconomico === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="sociofamiliar"
              [(ngModel)]='demanda.sociofamiliar'>
            <label class="form-check-label" for="sociofamiliar">
              Sociofamiliar <i *ngIf="form.demandas.sociofamiliar === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="violenciaDeGenero"
              [(ngModel)]='demanda.violenciaDeGenero'>
            <label class="form-check-label" for="violenciaDeGenero">
              Violência de Gênero <i *ngIf="form.demandas.violenciaDeGenero === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="violenciaUrbana"
              [(ngModel)]='demanda.violenciaUrbana'>
            <label class="form-check-label" for="violenciaUrbana">
              Violência Urbana <i *ngIf="form.demandas.violenciaUrbana === true" class="fa fa-check text-success"
                aria-hidden="true"></i>
            </label>
          </div>
  
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="outros">
            <label class="form-check-label" for="outros">
              Outros: ({{form.demandas.outros}})
            </label>
            <input type="text" class="form-control" id="outrosInput" [(ngModel)]='demanda.outros'>
          </div>
        </div>
  
  
        <div class="row">
          <div class="col">
            <div class="form-group mt-3">
              <label for="vulnerabilidade ">Duração do atendimento (Selecionado: {{form.duracao}} )</label>
              <select class="form-control" id="vulnerabilidade" (change)='tempo($event)'>
                <option disabled selected hidden>Selecione uma duração</option>
                <option value='5'>5 min</option>
                <option value='10'>10 min</option>
                <option value='15'>15 min</option>
                <option value='20'>20 min</option>
                <option value='25'>25 min</option>
                <option value='30'>30 min</option>
                <option value='35'>35 min</option>
                <option value='40'>40 min</option>
                <option value='45'>45 min</option>
                <option value='50'>50 min</option>
                <option value='55'>55 min</option>
                <option value='60'>60 min</option>
                <option value='65'>65 min</option>
                <option value='70'>70 min</option>
                <option value='75'>75 min</option>
                <option value='80'>80 min</option>
                <option value='85'>85 min</option>
                <option value='90'>90 min</option>
                <option value='95'>95 min</option>
                <option value='100'>100 min</option>
                <option value='105'>105 min</option>
                <option value='110'>110 min</option>
                <option value='115'>115 min</option>
                <option value='120'>120 min</option>
              </select>
            </div>
          </div>
          <div class="col">
            <div class="form-group mt-3">
              <label for="vulnerabilidade ">Vulnerabilidade (Selecionado: {{form.nivelUrgencia}} )</label>
              <select class="form-control" id="vulnerabilidade" (change)='vulnerabilidade($event)'>
                <option disabled selected hidden>Selecione a vulnerabilidade</option>
                <option *ngFor='let prioridade of listaPrioridade' value={{prioridade}}>
                  {{prioridade}}
                </option>
              </select>
            </div>
          </div>
        </div>
  
        <div class="form-group">
          <label for="descricao">Descrição do atendimento</label>
          <textarea type="text" class="form-control" id="descricao" placeholder="Descreva aqui o atendimento" rows='7'
            maxlength="63000" [(ngModel)]='form.descricao'></textarea>
          <div class="d-flex justify-content-end">
            <span class="text-danger">{{63000 - form.descricao?.length}} caracteres restantes</span>
          </div>
  
        </div>
  
        <div class="d-flex justify-content-center mt-3 mb-3">
          <button type="submit" class="btn btn-outline-danger mr-3"
            routerLink='/lista-form-bemestar-pos'>Cancelar</button>
          <button type="submit" class="btn btn-outline-success" (click)='finalizar()'>Atualizar</button>
        </div>
  
  
      </div>
    </div>
  </ng-container>
  <ng-template #elseTemplate>
    <h3 class="text-info text-center">Carregando dados</h3>
    <div class="row mt-5" id="loading">
      <div class="col d-flex justify-content-center">
        <div class="lds-spinner"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
      </div>
    </div>
  </ng-template>
  

  

</div>
