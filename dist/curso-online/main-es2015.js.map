<div class="mb-5">

  <div class="row mt-5 d-flex justify-content-center">
    <div class="col-md-6 p-0 mr-2">
      <div class="form-group">
        <input class="form-control" type="text" placeholder="Digite um titulo de algum aviso para pesquisar" [(ngModel)]='temaAviso' (keyup)='pesquisar()'>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-12">
      <div *ngFor='let item of listaAvisos | orderBy : key : reverse | paginate: { itemsPerPage: 5, currentPage: page }'>
          <div class="card mt-5 border border-secondary shadow" >
            <div class="card-header bg-white border-0">

                <div class="row d-flex align-items-center">
                    <div class="col-md-10 ">
                      <img src="https://i.imgur.com/iPnUWdQ.png" class="w-20 img-fluid mr-2" alt=""><span class="card-title font-weight-bold mb-0 mr-2">{{item.user.nome}}:</span>
                      <span class="font-weight-bold titulo">{{item.titulo}}</span>
                    </div>
                </div>
                <hr class="pb-0 mb-0">
            </div>

            <div class="card-body pt-0" >
              <p class="card-text" aria-describedby="texto">{{item.texto}} </p>
              <div *ngIf='item.link != null' class="text-truncate">
                <a href="{{item.link}}">{{item.link}}</a>
              </div>

              <div class="d-flex justify-content-end">
                <small id="texto" class="form-text m-0 text-muted text-monospace">
                  Postado em {{ item.data | date:'dd/MM/yyyy'}} às {{item.data | date:'HH:mm'}}</small>
              </div>

            </div>
          </div>


    </div>
  </div>
</div>

<div class="row mt-5">
  <div class="col-md-12 d-flex justify-content-center">
    <pagination-controls
    (click)='scroll()'
    class="p-zero"
    (pageChange)="page = $event"
    previousLabel="Anterior"
    nextLabel="Próximo"
    responsive="true"
    >
  </pagination-controls>
  </div>
</div>
</div>
