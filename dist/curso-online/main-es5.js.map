<div class="container">
  <div class="row d-flex justify-content-center mt-5">
    <div class="col-md-4">
      <div class="form-group w-100">
        <label for="nome" class="mb-0">Nome do participante: </label>
        <input class="form-control" type="text" name="nome" id="nome" [(ngModel)]='entregas.nome'>
      </div>
    </div>
    <div class="col-md-4">
      <div class="form-group w-100">
        <label for="inputState" class="mb-0">Turma: </label>
        <select name="nome" [(ngModel)]="idTurma" (change)="findByIdTurma()" class="form-control">
          <option *ngFor="let item of listaTurma" value={{item.id}}>
              {{item.descricao}}
          </option>
      </select>
      </div>
    </div>
    <div class="col-md-4">
      <div class="form-group w-100">
        <label for="data" class="mb-0">Data: </label>
        <input class="form-control" type="date" name="data" id="data" [(ngModel)]='entregas.data'>
      </div>
    </div>
  </div>

  <div class="row mb-5 mt-3">
    <div class="col md-12 d-flex justify-content-center">
      <button class="btn btn-outline-info btn-responsive" (click)="findEntregas()">Listar</button>
    </div>
  </div>


  <div *ngIf='listagemOk'>

    <div class="row">
      <div class="col-md-12">
        <div class="table-responsive">
  <table class="table table-hover">
          <thead>
            <tr>
              <th scope="col">Participante</th>
              <th scope="col">Turma</th>
              <th scope="col">Data</th>
              <th scope="col">Qtd Entregas</th>
              <th scope="col">Qtd Atividades</th>
              <th scope="col">% Entregas</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor='let item of listaEntregas'>
              <th>{{item.nome}}</th>
              <td>{{item.turma}}</td>
              <td>{{item.data | date: "dd/MM/yyyy"}}</td>
              <td>{{item.entregas}}</td>
              <td>{{item.atividades}}</td>
              <td>{{item.percent.toString() == 'NaN' ? 0 : item.percent}}%</td>
            </tr>
          </tbody>
        </table>
</div>
      </div>
    </div>

    <div class="row mt-5 mb-5">
      <div class="col-md-12 d-flex justify-content-center">
        <button class="btn btn-outline-success btn-responsive" (click)='exportarExcel()'>Exportar para excel</button>
      </div>
    </div>
  </div>

</div>
