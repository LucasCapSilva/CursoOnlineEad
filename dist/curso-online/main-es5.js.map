<div class="container">
  <div class="row mt-3">
    <div class="col-md-12">
      <h1 class="text-center">Apagar Sessão</h1>
    </div>
  </div>


  <div class="row d-flex justify-content-center">
    <div class="col-md-">
      <div class="card mt-5">
        <div class="card-body text-center">
          <small>Data e hora da sessão:</small>
          <p class="mb-0 mt-2">{{cronograma.date | date: 'dd/MM/yyyy'}} - Das {{cronograma.inicio}} às {{cronograma.fim}}</p>


          <small>Descrição:</small>
          <p class="mb-0 mt-2">{{cronograma.descricao}}</p>
          <small>Turma:</small>
          <p class="mb-0 mt-2">{{cronograma.turma.descricao}}</p>
        </div>
      </div>
    </div>
  </div>


  <div class="row d-flex justify-content-center mt-5 mb-5">
    <div class="col-md-8">
      <h3 class="text-center">Tem certeza que deseja apagar essa sessão?</h3>
    </div>
  </div>

  <div class="row d-flex justify-content-center mb-5">
    <div class="col-md-6 d-flex justify-content-center">
      <button class="btn btn-outline-success mr-3" (click)='btnSim()'>Sim</button>
      <button class="btn btn-outline-danger" (click)='btnNao()'>Não</button>
    </div>
  </div>
</div>
