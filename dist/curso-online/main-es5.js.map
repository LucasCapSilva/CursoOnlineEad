<div class="container">
    <div class="row mt-3 mb-5 d-flex justify-content-center">
        <div class="col-md-8 shadow">


            <div class="row mt-3">
                <div class="col col-md-6">
                    <div class="form-group">
                        <label for="nome">Turma</label>
                        <select id="turma" name="turma" [(ngModel)]="idTurma" (change)="findByIdTurma()"
                            class="form-control bg-black text-dark">
                            <option *ngFor="let turma of listaTurma" value={{turma.id}}>
                                {{turma.descricao}}
                            </option>
                        </select>
                    </div>
                </div>
                <div class="col col-md-6">
                    <div class="form-group">
                        <label for="nome">Curso</label>
                        <select id="turma" name="turma" [(ngModel)]="idTurma" (change)="findByIdTurma()"
                            class="form-control bg-black text-dark">
                            <option *ngFor="let turma of listaTurma" value={{turma.id}}>
                                {{turma.descricao}}
                            </option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col col-md-4">
                    <div class="form-group">
                        <label for="nome">dataAula0</label>
                        <input type="date" class="form-control" id="data">
                    </div>
                </div>
                <div class="col col-md-4">
                    <div class="form-group">
                        <label for="nome">dataDiaAdm</label>
                        <input type="date" class="form-control" id="data">
                    </div>
                </div>
                <div class="col col-md-4">
                    <div class="form-group">
                        <label for="nome">dataFormatura</label>
                        <input type="date" class="form-control" id="data">
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-center mt-3 mb-3">
                <input type="button" value="Enviar" class="btn btn-outline-success">
            </div>
        </div>

    </div>
</div>
